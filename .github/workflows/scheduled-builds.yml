name: Scheduled Builds

on:
  schedule:
    - cron: '5 1 * * *'

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
    - name: request
      uses: wei/curl@master
      with:
        args: 'curl -X POST -H "Authorization: token ${{ secrets.PAGES_ACCESS_TOKEN }}" -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/itopaloglu83/itopaloglu83.github.io/pages/builds'
